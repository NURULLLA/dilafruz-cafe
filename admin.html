<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель управления Dilafruz</title>
  <link rel="stylesheet" href="admin.css">
  <!-- QR Code Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <!-- Background Elements (Matches Main Site) -->
  <div class="noise-overlay"></div>
  
  <div id="loginSection" class="section">
    <div class="login-card reveal">
      <img src="images/logo-type2.png" alt="Logo" class="login-logo">
      <h2>Панель администратора</h2>
      <p class="login-hint">Введите ваш GitHub Token для управления меню</p>
      <div class="input-group">
        <input type="password" id="password" placeholder="GitHub Personal Access Token">
      </div>
      <button id="loginBtn" class="btn-primary">Войти</button>
      <p id="loginError" class="error hidden">Неверный токен или ошибка доступа</p>
    </div>
  </div>

  <div id="dashboardSection" class="section hidden">
    <header class="admin-header">
      <div class="header-left">
        <img src="images/logo-type2.png" alt="Logo" class="admin-logo">
        <h2>Управление меню</h2>
      </div>
      <div class="header-right">
        <a href="/" target="_blank" class="btn-outline">На сайт</a>
        <button id="logoutBtn" class="btn-secondary">Выйти</button>
      </div>
    </header>

    <div class="dashboard-content">
      <aside class="sidebar">
        <button id="addNewBtn" class="btn-primary">Добавить блюдо</button>
        <div class="qr-section">
          <h3>QR-код стола</h3>
          <div id="qrcode"></div>
          <p>Отсканируйте, чтобы открыть меню</p>
          <button id="downloadQrBtn" class="btn-mini">Скачать QR</button>
        </div>
      </aside>
      
      <main class="main-content">
        <div class="table-container">
          <table id="menuTable">
            <thead>
              <tr>
                <th>Фото</th>
                <th>Название (EN / RU / UZ)</th>
                <th>Категория</th>
                <th>Цена</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody>
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal for Add/Edit -->
  <div id="itemModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Добавить блюдо</h3>
        <span class="close" id="closeModal">&times;</span>
      </div>
      <form id="itemForm">
        <input type="hidden" id="itemId">
        
        <div class="form-row">
          <div class="form-group">
            <label>Категория:</label>
            <select id="itemCategory" name="categoryId" required>
              <option value="dishes">1 блюда</option>
              <option value="kebabs">Шашлыки</option>
              <option value="drinks">Напитки</option>
              <option value="sides">Гарниры</option>
              <option value="desserts">Десерты</option>
              <option value="salads">Салаты</option>
              <option value="appetizers">Холодные Закуски</option>
              <option value="hookah">Кальяны</option>
            </select>
          </div>
          <div class="form-group">
            <label>Цена:</label>
            <input type="text" id="itemPrice" name="price" placeholder="например, 50 000 сум" required>
          </div>
        </div>
        
        <div class="form-group">
          <label>Изображение:</label>
          <div class="file-input-wrapper">
            <input type="file" id="itemImage" name="image" accept="image/*">
          </div>
        </div>
        
        <div class="lang-tabs">
          <div class="lang-tab">
            <h4>English</h4>
            <input type="text" id="nameEn" name="name.en" placeholder="Item Name" required>
            <textarea id="descEn" name="desc.en" placeholder="Description"></textarea>
          </div>
          <div class="lang-tab">
            <h4>Русский</h4>
            <input type="text" id="nameRu" name="name.ru" placeholder="Название" required>
            <textarea id="descRu" name="desc.ru" placeholder="Описание"></textarea>
          </div>
          <div class="lang-tab">
            <h4>O'zbekcha</h4>
            <input type="text" id="nameUz" name="name.uz" placeholder="Nomi" required>
            <textarea id="descUz" name="desc.uz" placeholder="Tavsifi"></textarea>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="saveItemBtn">Сохранить</button>
      </form>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
