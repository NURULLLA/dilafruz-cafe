<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BF953F" />
      <stop offset="25%" style="stop-color:#FCF6BA" />
      <stop offset="50%" style="stop-color:#B38728" />
      <stop offset="75%" style="stop-color:#FBF5B7" />
      <stop offset="100%" style="stop-color:#AA771C" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Stylized Script 'D' -->
    <path d="M240,150 C240,80 300,50 360,50 C420,50 430,90 410,130 C390,170 330,220 280,240 C230,260 190,250 180,210 C170,170 210,130 240,150 Z M260,160 C240,140 210,170 210,200 C210,230 240,240 270,230 C310,210 380,160 395,120 C405,90 390,75 365,75 C330,75 270,100 260,160 Z" fill="url(#goldGrad)" />
    
    <!-- Cocktail Glass integrated into the D design -->
    <path d="M380,120 L480,120 L430,180 L430,220 L460,220 L460,230 L400,230 L400,220 L430,220 L430,185 Z M395,130 L465,130 L430,170 Z" fill="url(#goldGrad)" opacity="0.9" />
    
    <!-- RESTO Text -->
    <text x="140" y="165" font-family="'Playfair Display', 'Times New Roman', serif" font-size="42" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle">RESTO</text>
    <rect x="70" y="180" width="140" height="3" fill="url(#goldGrad)" />
    
    <!-- BAR Text -->
    <text x="500" y="165" font-family="'Playfair Display', 'Times New Roman', serif" font-size="42" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle">BAR</text>
    <rect x="430" y="180" width="140" height="3" fill="url(#goldGrad)" />
  </g>
</svg>
